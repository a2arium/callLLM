name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - package.json
      - yarn.lock
      - src/**
      - docs/**
      - examples/**
      - callllm-logo.png
      - README.md
      - LICENSE
      - tsconfig*.json
      - verification/**
      - scripts/**
      - .github/workflows/publish.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.repository_owner == 'a2arium'
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Check npm version
        id: npm-version
        shell: bash
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"

          if npm view "${package_name}@${package_version}" version --silent >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "${package_name}@${package_version} already exists on npm. Skipping publish."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Will publish ${package_name}@${package_version}."
          fi

      - name: Show trusted publishing context
        if: steps.npm-version.outputs.publish == 'true'
        run: |
          echo "event_name=${GITHUB_EVENT_NAME}"
          echo "repository=${GITHUB_REPOSITORY}"
          echo "repository_owner=${GITHUB_REPOSITORY_OWNER}"
          echo "workflow=${GITHUB_WORKFLOW}"
          echo "ref=${GITHUB_REF}"
          echo "sha=${GITHUB_SHA}"
          echo "node=$(node --version)"
          echo "npm=$(npm --version)"
          npm config get registry
          node -p "require('./package.json').repository.url"

      - name: Publish to npm
        if: steps.npm-version.outputs.publish == 'true'
        run: npm publish --access public
