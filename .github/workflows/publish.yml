name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - package.json
      - yarn.lock
      - src/**
      - docs/**
      - examples/**
      - callllm-logo.png
      - README.md
      - LICENSE
      - tsconfig*.json
      - verification/**
      - scripts/**
      - .github/workflows/publish.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.repository == 'a2arium/callllm'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check npm version
        id: npm-version
        shell: bash
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"

          if npm view "${package_name}@${package_version}" version --silent >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "${package_name}@${package_version} already exists on npm. Skipping publish."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Will publish ${package_name}@${package_version}."
          fi

      - name: Verify npm token
        if: steps.npm-version.outputs.publish == 'true'
        shell: bash
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error title=Missing NPM_TOKEN::Add an npm automation token as a GitHub repository secret named NPM_TOKEN, or configure npm trusted publishing and update this workflow."
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: steps.npm-version.outputs.publish == 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
